<!-- your-component.component.html -->
<div class="flex flex-col">
  <div *ngFor="let user of usersWithPosts" class="mb-8">
    <div class="flex items-center mb-2">
      <img
        [src]="user.profileImage || 'https://via.placeholder.com/32'"
        alt="{{ user.fullname }}"
        class="inline-block h-8 w-8 rounded-full mr-2"
      />
      <span class="text-white flex-1 font-bold">{{ user.fullname }}</span>
      <button
        class="flex justify-center border rounded-full p-1 w-28 h-10 border-zinc-700 items-center gap-2 text-white"
      >
        follow
        <svg
          class="text-white"
          enable-background="new 0 0 50 50"
          height="25px"
          viewBox="0 0 50 50"
          width="25px"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect fill="none" height="25" width="50" />
          <line
            fill="none"
            stroke="#fff"
            stroke-miterlimit="10"
            stroke-width="4"
            x1="9"
            x2="41"
            y1="25"
            y2="25"
          />
          <line
            fill="none"
            stroke="#fff"
            stroke-miterlimit="10"
            stroke-width="4"
            x1="25"
            x2="25"
            y1="9"
            y2="41"
          />
        </svg>
      </button>
    </div>

    <!-- User’s posts -->
    <div class="flex flex-col gap-4">
      <div *ngFor="let post of user.posts" class="user-card">
        <img
          [src]="post.image"
          alt="{{ post.title }}"
          class="post-image rounded-lg w-full"
        />
        <h3 class="mt-2 text-white font-semibold">{{ post.title }}</h3>
      </div>
    </div>
    <hr class="mt-3 border-zinc-700" />
  </div>
</div>
